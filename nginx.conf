server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster mobile loads
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Cache static HTML for 1 hour (lets edits propagate quickly while still being fast)
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Cache xml/txt for 1 day
    location ~* \.(xml|txt)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # Serve root as index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Hide nginx version
    server_tokens off;

    # 404 falls back to index (single-page-app style; safe for our 3-page site)
    error_page 404 /index.html;
}
